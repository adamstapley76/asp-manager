<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adam Stapley Plumbing</title>
  <style>
    :root{color:#172334;font-family:Arial,sans-serif}body{margin:0;background:#f4f6f8}.page{max-width:760px;margin:24px auto;background:#fff;padding:32px;border-radius:14px;box-sizing:border-box}.brand{color:#10263f;font-weight:800;font-size:26px}.meta{color:#596579}.head{display:flex;justify-content:space-between;gap:16px;border-bottom:3px solid #c9a227;padding-bottom:18px}.line{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #e4e8ee}.total{font-size:22px;font-weight:bold}.btn{display:inline-block;border:0;background:#c9a227;color:#10263f;text-decoration:none;font-weight:bold;padding:14px 20px;border-radius:8px;cursor:pointer;font:inherit}.field{width:100%;box-sizing:border-box;border:1px solid #c9d1dc;border-radius:8px;padding:12px;font:inherit}.notice{background:#fff4d9;padding:14px;border-radius:8px;margin-top:22px}.error{background:#fee2e2;color:#991b1b}@media(max-width:600px){.page{margin:0;min-height:100vh;border-radius:0;padding:24px 18px}.head{display:block}.head aside{margin-top:12px;text-align:left!important}}@media print{body{background:#fff}.page{margin:0;max-width:none}.no-print{display:none}}
  </style>
</head>
<body>
  <main class="page" id="app"><p class="meta">Loading document…</p></main>
  <script>
    const api='https://njlxklvpbcmmyaartboh.supabase.co/functions/v1/document-view', app=document.getElementById('app'), token=new URLSearchParams(location.search).get('token')||'';
    const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const pounds=value=>new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(Number(value||0));
    const date=value=>value?new Date(`${value}T12:00:00`).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'Not set';
    async function acceptQuote(data){const button=document.getElementById('accept'),note=document.getElementById('note'),message=document.getElementById('acceptMessage');button.disabled=true;button.textContent='Saving…';try{const response=await fetch(data.acceptance_endpoint,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:data.token,comment:note.value})}),result=await response.json();if(!response.ok)throw new Error(result.error||'Please try again.');message.textContent='Thank you — your quote has been accepted. Adam will be in touch to arrange a date.';button.remove();note.remove()}catch(error){message.textContent=error.message||'Please try again.';button.disabled=false;button.textContent='Accept quote'}}
    async function load(){if(!token){app.innerHTML='<div class="notice error">This customer link is incomplete.</div>';return}try{const response=await fetch(`${api}?token=${encodeURIComponent(token)}`),data=await response.json();if(!response.ok)throw new Error(data.error||'This document is unavailable.');const lines=data.line_items.map(line=>`<div class="line"><span>${esc(line.description)} × ${esc(line.quantity)}</span><b>${pounds(Number(line.quantity||0)*Number(line.unit_price||0))}</b></div>`).join(''),kind=data.type==='quote'?'Quote':'Invoice',dateLabel=data.type==='quote'?'Valid until':'Due';document.title=`${kind} ${data.number} | Adam Stapley Plumbing`;app.innerHTML=`<div class="head"><div><div class="brand">Adam Stapley Plumbing</div><div class="meta">Gas engineer & plumber</div></div><aside style="text-align:right"><b>${kind.toUpperCase()}</b><br>${esc(data.number)}</aside></div><p style="margin-top:26px"><b>For:</b><br>${esc(data.customer.name)}<br>${esc([data.customer.address,data.customer.postcode].filter(Boolean).join(', '))}</p><h1>${esc(data.title)}</h1><p class="meta">${dateLabel}: ${date(data.due_date)}</p>${lines}<div style="margin-top:22px"><div class="line"><span>Subtotal</span><b>${pounds(data.subtotal)}</b></div><div class="line"><span>VAT (${esc(data.vat_rate)}%)</span><b>${pounds(data.vat_amount)}</b></div><div class="line total"><span>Total</span><span>${pounds(data.total)}</span></div></div>${data.notes?`<section class="notice"><b>Notes</b><br>${esc(data.notes).replace(/\n/g,'<br>')}</section>`:''}${data.can_accept?`<section class="notice no-print"><b>Accept this quote</b><p class="meta">Add an optional note before confirming.</p><textarea id="note" class="field" placeholder="Preferred dates or anything you would like to discuss"></textarea><button id="accept" class="btn" style="margin-top:12px">Accept quote</button><div id="acceptMessage" class="meta" style="margin-top:10px"></div></section>`:''}<p class="meta" style="margin-top:34px">Questions? Reply to the email or call 07966 858348.</p><button class="btn no-print" style="background:#10263f;color:#fff" onclick="window.print()">Print / save PDF</button>`;if(data.can_accept)document.getElementById('accept').addEventListener('click',()=>acceptQuote(data))}catch(error){app.innerHTML=`<div class="notice error">${esc(error.message||'This document is unavailable.')}</div>`}}
    load();
  </script>
</body>
</html>
