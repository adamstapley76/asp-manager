<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adam Stapley Plumbing</title>
  <style>
    @page{size:A4;margin:0}
    :root{color:#172334;font-family:Aptos,"Segoe UI",Arial,sans-serif;font-synthesis:none}
    *{box-sizing:border-box}
    body{margin:0;background:#edf1f4;color:#172334;font-size:14px;line-height:1.5}
    .page{width:min(210mm,100%);min-height:297mm;margin:22px auto;background:#fff;padding:16mm 17mm 15mm;box-shadow:0 18px 50px rgba(23,35,52,.16)}
    .accent{height:5px;background:#cda136;margin:-16mm -17mm 13mm}
    .header{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}
    .brand{width:58%}.brand-logo{display:block;width:260px;max-width:100%;height:68px;object-fit:contain;object-position:left center}.company{margin-top:9px;color:#405064;line-height:1.6}.company strong{display:block;color:#172334;font-size:17px;letter-spacing:-.01em;margin-bottom:2px}
    .doc-panel{text-align:right;min-width:190px}.doc-type{font-size:30px;line-height:1;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#172334;margin:0 0 11px}.doc-meta{border-collapse:collapse;margin-left:auto;color:#405064}.doc-meta td{padding:2px 0 2px 18px}.doc-meta td:first-child{font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:#778596}.doc-meta td:last-child{font-weight:700;color:#172334}
    .gas-safe-wrap{margin:12px 0 0 auto;width:102px;text-align:center}.gas-safe{display:block;width:92px;height:92px;object-fit:contain;margin:0 auto}.gas-safe-number{margin-top:3px;font-size:10px;font-weight:800;letter-spacing:.04em;color:#172334}
    .rule{border:0;border-top:1px solid #dce2e8;margin:13mm 0 9mm}
    .bill{display:grid;grid-template-columns:110px 1fr;gap:12px;min-height:65px}.eyebrow{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#c08f1f;padding-top:2px}.customer-name{font-size:16px;font-weight:800;color:#172334;margin-bottom:3px}.customer-address{color:#405064;white-space:pre-line}
    table.items{width:calc(100% + 34mm);margin:10mm -17mm 0;border-collapse:collapse}.items th{background:#172334;color:#fff;padding:10px 17mm;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;text-align:left}.items th.number{text-align:right}.items td{padding:12px 17mm;border-bottom:1px solid #e1e6eb;color:#334155}.items td.number{text-align:right;white-space:nowrap}.items .strong{font-weight:800;color:#172334}.items .empty{text-align:center;color:#778596;font-style:italic}
    .summary{display:grid;grid-template-columns:1.14fr .86fr;gap:12mm;margin-top:11mm;align-items:start}.payment{background:#f3f5f7;border-left:4px solid #cda136;padding:15px 16px 14px;color:#405064;min-height:154px}.payment h2,.terms h2{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#172334;margin:0 0 10px}.payment strong{color:#172334}.reference{margin-top:13px;padding-top:10px;border-top:1px solid #d8dfe6;color:#172334;font-size:11px}.reference b{font-weight:800}.total-row{display:flex;justify-content:space-between;gap:18px;padding:7px 0;color:#405064}.total-row b{color:#172334}.total-row.grand{margin-top:8px;padding:10px 0;border-top:2px solid #172334;border-bottom:2px solid #172334;color:#172334;font-size:20px;font-weight:800}.paid{display:inline-block;margin-top:15px;border:3px solid #b91c1c;border-radius:7px;color:#b91c1c;padding:4px 12px;font-size:23px;font-weight:900;letter-spacing:.08em;transform:rotate(-4deg)}
    .terms{margin-top:13mm;padding-top:8mm;border-top:1px solid #dce2e8;color:#526173;max-width:126mm}.terms p{margin:0}.notes{margin-top:8px}.footer{position:relative;margin-top:16mm;padding-top:6mm;border-top:1px solid #dce2e8;color:#778596;font-size:10px;letter-spacing:.01em}.footer b{color:#405064}
    .actions{width:min(210mm,100%);margin:0 auto 24px;display:flex;justify-content:flex-end;gap:10px}.button{border:0;border-radius:8px;background:#172334;color:#fff;padding:11px 15px;font:inherit;font-weight:800;cursor:pointer}.button.gold{background:#cda136;color:#172334}.accept-panel{margin-top:13mm;padding:16px;border:1px solid #e4d5a9;border-radius:10px;background:#fff9eb}.accept-panel h2{margin:0 0 4px;font-size:16px}.accept-panel p{margin:0;color:#526173}.field{width:100%;min-height:76px;margin-top:12px;border:1px solid #c9d1dc;border-radius:8px;padding:10px;font:inherit}.message{margin-top:10px;color:#405064;font-weight:700}
    .error{width:min(700px,calc(100% - 32px));margin:48px auto;padding:18px;border-radius:10px;background:#fee2e2;color:#991b1b}
    @media(max-width:680px){body{background:#fff}.page{margin:0;padding:14mm 7mm 12mm;box-shadow:none}.accent{margin:-14mm -7mm 10mm}.header{display:block}.brand{width:100%}.doc-panel{text-align:left;margin-top:10mm}.doc-meta{margin-left:0}.gas-safe-wrap{margin-left:0}.bill{grid-template-columns:1fr;gap:4px}.items th,.items td{padding-left:7mm;padding-right:7mm}.summary{grid-template-columns:1fr;gap:7mm}.terms{max-width:none}.actions{padding:12px;position:sticky;bottom:0;background:rgba(255,255,255,.94);box-shadow:0 -4px 16px rgba(23,35,52,.1)}}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;background:#fff}.page{margin:0;box-shadow:none}.no-print{display:none!important}}
  </style>
</head>
<body>
  <main class="page" id="app"><p style="color:#596579">Loading document…</p></main>
  <div class="actions no-print" id="actions" hidden><button class="button" onclick="window.print()">Print / save PDF</button></div>
  <script>
    const api='https://njlxklvpbcmmyaartboh.supabase.co/functions/v1/document-view';
    const app=document.getElementById('app'),actions=document.getElementById('actions');
    const token=new URLSearchParams(location.search).get('token')||'';
    const logoUrl='https://adamstapley.co.uk/wp-content/uploads/2026/06/cropped-FullLogo_Transparent_NoBuffer.png';
    const gasSafeLogoUrl='https://adamstapley.co.uk/wp-content/uploads/2026/02/GS_Reglogo_1a.png';
    const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const pounds=value=>new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(Number(value||0));
    const date=value=>value?new Date(`${value}T12:00:00`).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'Not set';
    const customerAddress=customer=>{
      const address=String(customer?.address||'').trim(),postcode=String(customer?.postcode||'').trim();
      const compact=value=>value.toUpperCase().replace(/\s+/g,'');
      return [address,postcode&&(!address||!compact(address).includes(compact(postcode)))?postcode:''].filter(Boolean).join('\n')||'Address not recorded';
    };
    async function acceptQuote(data){
      const button=document.getElementById('accept'),note=document.getElementById('note'),message=document.getElementById('acceptMessage');
      button.disabled=true;button.textContent='Saving...';
      try{const response=await fetch(data.acceptance_endpoint,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:data.token,comment:note.value})}),result=await response.json();if(!response.ok)throw new Error(result.error||'Please try again.');message.textContent='Thank you - your quote has been accepted. Adam will be in touch to arrange a date.';button.remove();note.remove()}catch(error){message.textContent=error.message||'Please try again.';button.disabled=false;button.textContent='Accept quote'}
    }
    function documentHtml(data){
      const quote=data.type==='quote',kind=quote?'Quote':'Invoice',isPaid=data.status==='paid';
      const lines=(Array.isArray(data.line_items)?data.line_items:[]).map(line=>`<tr><td>${esc(line.description||'')}</td><td class="number">${esc(line.quantity||0)}</td><td class="number">${pounds(line.unit_price)}</td><td class="number strong">${pounds(Number(line.quantity||0)*Number(line.unit_price||0))}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">No line items added</td></tr>';
      const reference=`${String(data.customer?.name||'Customer').trim().split(/\s+/).slice(-1)[0]} ${data.number}`;
      const terms=quote?'This quotation is valid for 30 days. Larger works, including boiler installations, may require a 50% deposit to secure materials and availability.':'Payment is due on completion unless another arrangement has been agreed in advance.';
      const payment=quote?`<h2>Quotation details</h2><strong>We're ready when you are</strong><br>This quote is valid for 30 days. A deposit may be requested for larger jobs once a date and materials are agreed.`:`<h2>Payment details</h2><strong>Bank transfer / internet banking</strong><br>NatWest<br>Sort code: 60-08-01<br>Account number: 62947591<div class="reference">Payment reference<br><b>${esc(reference)}</b></div>${isPaid?'<div class="paid">PAID</div>':''}`;
      return `<div class="accent"></div><header class="header"><section class="brand"><img class="brand-logo" src="${logoUrl}" alt="Adam Stapley Plumbing and Heating"><div class="company"><strong>Adam Stapley Plumbing Ltd</strong>23 Hazon Way, Epsom, KT19 8HD<br>info@adamstapley.co.uk &middot; www.adamstapley.co.uk &middot; 07966 858348<br>VAT Registration No. 327 0245 29</div></section><section class="doc-panel"><h1 class="doc-type">${kind}</h1><table class="doc-meta"><tr><td>${kind} no.</td><td>${esc(data.number)}</td></tr><tr><td>Date issued</td><td>${date(data.issue_date)}</td></tr><tr><td>${quote?'Valid until':'Due date'}</td><td>${date(data.due_date)}</td></tr></table><div class="gas-safe-wrap"><img class="gas-safe" src="${gasSafeLogoUrl}" alt="Gas Safe Register logo"><div class="gas-safe-number">Registration no. 234795</div></div></section></header><hr class="rule"><section class="bill"><div class="eyebrow">Bill to</div><div><div class="customer-name">${esc(data.customer?.name||'Customer')}</div><div class="customer-address">${esc(customerAddress(data.customer))}</div></div></section><table class="items"><thead><tr><th>Description</th><th class="number">Qty</th><th class="number">Unit price</th><th class="number">Amount</th></tr></thead><tbody>${lines}</tbody></table><section class="summary"><div class="payment">${payment}</div><div class="totals"><div class="total-row"><span>Subtotal</span><b>${pounds(data.subtotal)}</b></div><div class="total-row"><span>VAT at ${esc(data.vat_rate||20)}%</span><b>${pounds(data.vat_amount)}</b></div><div class="total-row grand"><span>Total</span><span>${pounds(data.total)}</span></div>${isPaid?'<div class="total-row"><span>Balance due</span><b>&pound;0.00</b></div>':''}</div></section><section class="terms"><h2>Terms &amp; conditions</h2><p>${terms}</p>${data.notes?`<p class="notes">${esc(data.notes).replace(/\n/g,'<br>')}</p>`:''}</section>${data.can_accept?`<section class="accept-panel no-print"><h2>Accept this quote</h2><p>Add an optional note before confirming.</p><textarea id="note" class="field" placeholder="Preferred dates or anything you would like to discuss"></textarea><button id="accept" class="button gold" style="margin-top:12px">Accept quote</button><div id="acceptMessage" class="message"></div></section>`:''}<footer class="footer"><b>Adam Stapley Plumbing Ltd</b> &middot; Registered in England &amp; Wales &middot; Gas Safe registration 234795</footer>`;
    }
    async function load(){
      if(!token){app.innerHTML='<div class="error">This customer link is incomplete.</div>';return}
      try{const response=await fetch(`${api}?token=${encodeURIComponent(token)}`),data=await response.json();if(!response.ok)throw new Error(data.error||'This document is unavailable.');document.title=`${data.type==='quote'?'Quote':'Invoice'} ${data.number} | Adam Stapley Plumbing`;app.innerHTML=documentHtml(data);actions.hidden=false;if(data.can_accept)document.getElementById('accept').addEventListener('click',()=>acceptQuote(data))}catch(error){app.innerHTML=`<div class="error">${esc(error.message||'This document is unavailable.')}</div>`}
    }
    load();
  </script>
</body>
</html>
