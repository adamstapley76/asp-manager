openapi: 3.1.0
info:
  title: ASP Manager Quote Intake
  version: 1.3.0
  description: >-
    Private ASP Manager Action. Before saving anything, establish whether Adam
    wants a quote, a diary booking, or both. If he wants a booking, confirm the
    actual date (and time where known) with him before calling a write action.
    Read the current estimator before drafting or
    pricing a quote. Only save a quote when Adam explicitly asks to send it.
    When Adam explicitly asks to book the work in as well, include
    job.booking_confirmed=true and its confirmed scheduled_date (and time if
    known). A date mentioned only as a customer request is not a booking.
    Use real conversation details only; never invent customer information or
    placeholder data. ASP Manager keeps the final estimator recommendation
    private and creates a draft for Adam to review.
servers:
  - url: https://asp-manager-git-daily-driver-bugfix-2-adamstapley.vercel.app
paths:
  /api/chatgpt/ping:
    get:
      operationId: pingAspManager
      summary: Check that ASP Manager quote intake is available.
      security: []
      responses:
        '200': { description: Connection is available. }
  /api/chatgpt/estimator:
    get:
      operationId: getEstimatorConfig
      summary: Read the current private ASP Manager estimator configuration.
      description: >-
        Use this before suggesting a price or drafting customer-facing wording.
        Treat it as internal guidance. Do not reveal internal minimum charge,
        pricing rationale or profit guidance to customers.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current editable estimator configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimatorConfigResponse'
        '401': { description: Missing or invalid Bearer token. }
  /api/chatgpt/quote:
    post:
      operationId: sendQuoteToAspManager
      summary: Create a reviewable ASP Manager quote.
      description: >-
        Call only after Adam explicitly asks to send the quote. Omit any optional
        details that were not supplied. Price is optional: when omitted, ASP
        Manager applies the current estimator as a review starting point.
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Reuse only when retrying exactly the same quote submission.
          schema: { type: string, maxLength: 240 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotePackage'
      responses:
        '201':
          description: A draft quote was created or an existing identical submission returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteSuccess'
        '400': { description: Invalid quote package. }
        '401': { description: Missing or invalid Bearer token. }
  /api/chatgpt/job:
    post:
      operationId: bookWorkInAspManager
      summary: Book work directly into the ASP Manager diary without a quote.
      description: >-
        Use only when Adam explicitly chooses diary booking rather than a quote.
        Before calling this action, restate the date and time understood from the
        conversation and get Adam's confirmation. scheduled_date and
        booking_confirmed=true are required. Do not call this to record a
        tentative customer request.
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Reuse only when retrying exactly the same work booking.
          schema: { type: string, maxLength: 240 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobPackage'
      responses:
        '201':
          description: Work was booked or an existing identical booking returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSuccess'
        '400': { description: Invalid work booking package. }
        '401': { description: Missing or invalid Bearer token. }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    QuotePackage:
      type: object
      additionalProperties: false
      required: [customer, job, quote]
      properties:
        source_reference:
          type: string
          maxLength: 240
          description: Stable reference for this exact quote. Omit if unavailable.
        customer:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name: { type: string, description: Actual customer name. }
            phone: { type: [string, 'null'], description: Omit when not supplied. }
            email: { type: [string, 'null'], format: email, description: Omit when not supplied. }
            address: { type: [string, 'null'], description: Omit when not supplied. }
            postcode: { type: [string, 'null'], description: Omit when not supplied. }
        lead:
          type: object
          additionalProperties: true
          properties:
            source: { type: [string, 'null'], description: Lead source if stated. }
        job:
          type: object
          additionalProperties: false
          required: [title]
          properties:
            title: { type: string }
            job_type: { type: [string, 'null'] }
            description: { type: [string, 'null'] }
            property_type: { type: [string, 'null'] }
            boiler_make: { type: [string, 'null'] }
            boiler_model: { type: [string, 'null'] }
            materials: { type: array, items: {} }
            confidence: { type: [string, 'null'] }
            assumptions: { type: [string, 'null'] }
            follow_up_reminders: { type: array, items: {} }
            booking_confirmed:
              type: boolean
              description: Set true only when Adam explicitly asks to book this work into the diary.
            scheduled_date:
              type: [string, 'null']
              format: date
              description: Confirmed diary date. Omit when the date is only requested or uncertain.
            scheduled_time:
              type: [string, 'null']
              pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
              description: Optional confirmed 24-hour diary time, in 15-minute increments where known.
        quote:
          type: object
          additionalProperties: false
          properties:
            issue_date: { type: [string, 'null'], format: date }
            price_ex_vat: { type: [number, 'null'], minimum: 0, description: Actual supplied price only; omit if no figure is agreed. }
            vat_rate: { type: number, minimum: 0, maximum: 100 }
            wording: { type: [string, 'null'], description: Customer-facing wording based on the conversation and estimator. }
            line_items:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [description, quantity, unit_price]
                properties:
                  description: { type: string }
                  quantity: { type: number, minimum: 0.01 }
                  unit_price: { type: number, minimum: 0 }
        photos:
          type: array
          description: Permanent HTTPS photo references only. Do not send temporary ChatGPT attachment URLs.
          items:
            type: object
            additionalProperties: false
            required: [url]
            properties:
              url: { type: string, format: uri, pattern: '^https://' }
              category: { type: [string, 'null'] }
              description: { type: [string, 'null'] }
              file_name: { type: [string, 'null'] }
              mime_type: { type: [string, 'null'] }
              file_size: { type: [integer, 'null'], minimum: 0 }
        notes: { type: [string, 'null'] }
    JobPackage:
      type: object
      additionalProperties: false
      required: [customer, job]
      properties:
        source_reference:
          type: string
          maxLength: 240
          description: Stable reference for this exact work booking. Omit if unavailable.
        customer:
          type: object
          additionalProperties: false
          required: [name]
          properties:
            name: { type: string, description: Actual customer name. }
            phone: { type: [string, 'null'], description: Omit when not supplied. }
            email: { type: [string, 'null'], format: email, description: Omit when not supplied. }
            address: { type: [string, 'null'], description: Omit when not supplied. }
            postcode: { type: [string, 'null'], description: Omit when not supplied. }
        lead:
          type: object
          additionalProperties: true
          properties:
            source: { type: [string, 'null'], description: Lead source if stated. }
        job:
          type: object
          additionalProperties: false
          required: [title, booking_confirmed, scheduled_date]
          properties:
            title: { type: string }
            job_type: { type: [string, 'null'] }
            description: { type: [string, 'null'] }
            property_type: { type: [string, 'null'] }
            boiler_make: { type: [string, 'null'] }
            boiler_model: { type: [string, 'null'] }
            materials: { type: array, items: {} }
            confidence: { type: [string, 'null'] }
            assumptions: { type: [string, 'null'] }
            booking_confirmed:
              type: boolean
              const: true
              description: Must be true after Adam confirms the date.
            scheduled_date:
              type: string
              format: date
              description: Confirmed diary date.
            scheduled_time:
              type: [string, 'null']
              pattern: '^([01]\\d|2[0-3]):[0-5]\\d$'
              description: Optional confirmed 24-hour diary time, in 15-minute increments where known.
        photos:
          type: array
          description: Permanent HTTPS photo references only. Do not send temporary ChatGPT attachment URLs.
          items:
            type: object
            additionalProperties: false
            required: [url]
            properties:
              url: { type: string, format: uri, pattern: '^https://' }
              category: { type: [string, 'null'] }
              description: { type: [string, 'null'] }
              file_name: { type: [string, 'null'] }
              mime_type: { type: [string, 'null'] }
              file_size: { type: [integer, 'null'], minimum: 0 }
        notes: { type: [string, 'null'] }
    EstimatorConfigResponse:
      type: object
      required: [success, version, configuration]
      properties:
        success: { type: boolean, const: true }
        api_version: { type: string }
        version: { type: integer }
        updated_at: { type: [string, 'null'], format: date-time }
        configuration: { type: object, description: Internal editable estimator guidance. }
    QuoteSuccess:
      type: object
      required: [success, customer_id, customer_status, job_id, quote_id, quote_number, duplicate, review_url]
      properties:
        success: { type: boolean, const: true }
        customer_id: { type: string, format: uuid }
        customer_status: { type: string, enum: [matched, created] }
        job_id: { type: string, format: uuid }
        quote_id: { type: string, format: uuid }
        quote_number: { type: string }
        duplicate: { type: boolean }
        booked_in_diary: { type: boolean, description: True when the linked job was also added to the diary. }
        estimator_config_version: { type: integer }
        estimator_recommendation: { type: object, description: Internal review information. }
        review_url: { type: [string, 'null'], format: uri }
    JobSuccess:
      type: object
      required: [success, customer_id, customer_status, job_id, duplicate, booked_in_diary, scheduled_date]
      properties:
        success: { type: boolean, const: true }
        customer_id: { type: string, format: uuid }
        customer_status: { type: string, enum: [matched, created] }
        job_id: { type: string, format: uuid }
        duplicate: { type: boolean }
        booked_in_diary: { type: boolean, const: true }
        scheduled_date: { type: string, format: date }
        scheduled_time: { type: [string, 'null'], pattern: '^([01]\\d|2[0-3]):[0-5]\\d$' }
